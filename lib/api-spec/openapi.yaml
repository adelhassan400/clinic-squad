openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ClinicSquad API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: clinics
    description: Clinic management
  - name: patients
    description: Patient management
  - name: appointments
    description: Appointment management
  - name: finances
    description: Financial management
  - name: subscriptions
    description: Subscription management
  - name: dashboard
    description: Dashboard summaries
  - name: team
    description: Team members and invitations
  - name: invitations
    description: Public invitation acceptance
  - name: prescriptions
    description: E-prescriptions (premium feature)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new clinic admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered successfully. Email must be verified before signing in.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "409":
          description: Email already exists

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify a user's email address using a one-time token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailBody"
      responses:
        "200":
          description: Email verified — returns an authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired token

  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      summary: Generate a new email verification link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendVerificationBody"
      responses:
        "200":
          description: Verification link generated (always returned, even when email is unknown or already verified)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResendVerificationResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/forgot-password:
    post:
      operationId: requestPasswordReset
      tags: [auth]
      summary: Request a password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordBody"
      responses:
        "200":
          description: Reset link generated (always returned, even when email is unknown)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password using a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordResponse"
        "400":
          description: Invalid or expired token

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password for the currently authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangePasswordResponse"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized or current password incorrect

  /admin/clinics/{clinicId}/detail:
    get:
      operationId: adminGetClinicDetail
      tags: [admin]
      summary: Get full detail for a single clinic (superadmin)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clinic detail with owner, members, counts, subscriptions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminClinicDetail"
        "404":
          description: Clinic not found

  /auth/events:
    get:
      operationId: listAuthEvents
      tags: [auth]
      summary: List recent sign-in and security events for the current user
      responses:
        "200":
          description: Recent events (most recent first, capped at 20)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthEvent"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /clinics/{clinicId}:
    get:
      operationId: getClinic
      tags: [clinics]
      summary: Get clinic by ID
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clinic data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  /clinics/{clinicId}/subscription:
    get:
      operationId: getSubscription
      tags: [subscriptions]
      summary: Get clinic subscription
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
    post:
      operationId: createSubscription
      tags: [subscriptions]
      summary: Create or upgrade subscription
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubscriptionBody"
      responses:
        "201":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /clinics/{clinicId}/patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List all patients
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of patients
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientList"
    post:
      operationId: createPatient
      tags: [patients]
      summary: Add a new patient
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "201":
          description: Patient created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"

  /clinics/{clinicId}/patients/{patientId}:
    get:
      operationId: getPatient
      tags: [patients]
      summary: Get patient by ID
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: patientId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    put:
      operationId: updatePatient
      tags: [patients]
      summary: Update patient
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: patientId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePatientBody"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
    delete:
      operationId: deletePatient
      tags: [patients]
      summary: Delete patient
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: patientId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: status
          schema:
            type: string
            enum: [scheduled, completed, cancelled, no_show]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentList"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create appointment
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /clinics/{clinicId}/appointments/{appointmentId}:
    put:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete appointment
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: appointmentId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /clinics/{clinicId}/finances:
    get:
      operationId: listFinances
      tags: [finances]
      summary: List financial records
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum: [income, expense]
        - in: query
          name: month
          schema:
            type: integer
        - in: query
          name: year
          schema:
            type: integer
      responses:
        "200":
          description: List of financial records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceList"
    post:
      operationId: createFinanceRecord
      tags: [finances]
      summary: Create financial record
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFinanceBody"
      responses:
        "201":
          description: Financial record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Finance"

  /clinics/{clinicId}/prescriptions:
    get:
      operationId: listPrescriptions
      tags: [prescriptions]
      summary: List prescriptions for the clinic (premium only)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: patientId
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: List of prescriptions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrescriptionList"
        "402":
          description: Premium plan required
    post:
      operationId: createPrescription
      tags: [prescriptions]
      summary: Create a new prescription (premium only, admin only)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePrescriptionBody"
      responses:
        "201":
          description: Prescription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"
        "402":
          description: Premium plan required
        "403":
          description: Admin role required

  /clinics/{clinicId}/prescriptions/{prescriptionId}:
    get:
      operationId: getPrescription
      tags: [prescriptions]
      summary: Get a prescription by id
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: prescriptionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prescription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Prescription"
        "404":
          description: Not found
    delete:
      operationId: deletePrescription
      tags: [prescriptions]
      summary: Delete a prescription (admin only)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: prescriptionId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Admin role required

  /clinics/{clinicId}/dashboard:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /clinics/{clinicId}/appointments/today:
    get:
      operationId: getTodayAppointments
      tags: [appointments]
      summary: Get today's appointments
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Today's appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  /clinics/{clinicId}/finances/summary:
    get:
      operationId: getFinanceSummary
      tags: [finances]
      summary: Get financial summary
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: query
          name: year
          schema:
            type: integer
      responses:
        "200":
          description: Financial summary with monthly breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceSummary"

  # SuperAdmin endpoints
  /admin/clinics:
    get:
      operationId: adminListClinics
      tags: [clinics]
      summary: SuperAdmin - list all clinics
      responses:
        "200":
          description: All clinics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Clinic"

  /admin/clinics/{clinicId}/activate:
    post:
      operationId: adminActivateClinic
      tags: [clinics]
      summary: SuperAdmin - activate clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  /admin/clinics/{clinicId}/block:
    post:
      operationId: adminBlockClinic
      tags: [clinics]
      summary: SuperAdmin - block clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  /clinics/{clinicId}/team/members:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List clinic team members (admin + invited members)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of team members and capacity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamOverview"

  /clinics/{clinicId}/team/members/{userId}:
    delete:
      operationId: removeTeamMember
      tags: [team]
      summary: Remove a team member from the clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed
        "403":
          description: Cannot remove the clinic owner

  /clinics/{clinicId}/team/invitations:
    get:
      operationId: listInvitations
      tags: [team]
      summary: List pending invitations for the clinic
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pending invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"
    post:
      operationId: createInvitation
      tags: [team]
      summary: Invite a secretary or nurse by email
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationBody"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "409":
          description: Email already on team or already invited
        "402":
          description: Plan member limit reached

  /clinics/{clinicId}/team/invitations/{invitationId}:
    delete:
      operationId: revokeInvitation
      tags: [team]
      summary: Revoke a pending invitation
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: invitationId
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Revoked

  /invitations/{token}:
    get:
      operationId: getInvitation
      tags: [invitations]
      summary: Get invitation details by token (public)
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationPublic"
        "404":
          description: Invalid or expired invitation

  /invitations/{token}/accept:
    post:
      operationId: acceptInvitation
      tags: [invitations]
      summary: Accept invitation, set password, and sign in
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationBody"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "404":
          description: Invalid or expired invitation
        "409":
          description: Email already in use

  /admin/subscriptions/{clinicId}/confirm:
    post:
      operationId: adminConfirmSubscription
      tags: [subscriptions]
      summary: SuperAdmin - confirm payment and activate subscription
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Invitation:
      type: object
      properties:
        id:
          type: string
        clinicId:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [secretary, nurse]
        token:
          type: string
        status:
          type: string
          enum: [pending, accepted, revoked, expired]
        invitedBy:
          type: string
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, clinicId, email, name, role, token, status, invitedBy, expiresAt, createdAt]

    InvitationPublic:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [secretary, nurse]
        clinicName:
          type: string
        expiresAt:
          type: string
          format: date-time
      required: [email, name, role, clinicName, expiresAt]

    CreateInvitationBody:
      type: object
      properties:
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
        role:
          type: string
          enum: [secretary, nurse]
      required: [email, name, role]

    AcceptInvitationBody:
      type: object
      properties:
        password:
          type: string
          minLength: 6
        name:
          type: string
          minLength: 1
      required: [password]

    TeamMember:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, secretary, nurse]
        isOwner:
          type: boolean
        isBlocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, email, name, role, isOwner, isBlocked, createdAt]

    TeamOverview:
      type: object
      properties:
        members:
          type: array
          items:
            $ref: "#/components/schemas/TeamMember"
        pendingCount:
          type: integer
        memberLimit:
          type: integer
        usedSlots:
          type: integer
        plan:
          type: string
      required: [members, pendingCount, memberLimit, usedSlots, plan]

    RegisterBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        clinicName:
          type: string
        ownerName:
          type: string
      required: [email, password, clinicName, ownerName]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
